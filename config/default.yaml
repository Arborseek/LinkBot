camera:
  device_id: 0
  width: 1280
  height: 720
  mirror: true
  auto_detect: true
  warmup_frames: 5
  read_retries: 5
  probe_timeout: 12.0
  # true=probe 失败直接退出；false=仍尝试打开（适合 probe 误报的环境）
  strict_probe: false

tracking:
  min_detection_confidence: 0.7
  min_tracking_confidence: 0.65
  model_path: assets/hand_landmarker.task

retarget:
  filter: one_euro
  filter_freq: 30
  smoothing_alpha: 0.35
  landmark_smooth: 0.28
  landmark_smooth_fast: 0.58
  landmark_idle_motion: 0.012
  max_joint_step: 0.11
  max_joint_step_fast: 0.28
  output_smooth: 0.48
  joint_deadzone: 0.012
  idle_motion: 0.028
  fast_motion: 0.10
  one_euro:
    min_cutoff: 0.58
    beta: 0.04
    d_cutoff: 1.0
  # MediaPipe 弯曲角参考：open 越大、closed 越小、gain 越大 → 弯曲幅度越大
  curl_open: 2.55
  curl_closed: 0.95
  curl_gain: 1.75
  tip_open: 2.6
  tip_closed: 0.65
  tip_gain: 1.85
  # 拇指专用（OK/捏合时对掌更灵敏）
  thumb_open: 2.35
  thumb_closed: 1.05
  thumb_gain: 1.85
  thumb_tip_open: 2.4
  thumb_tip_closed: 0.75
  thumb_tip_gain: 2.0
  # 捏合判定：拇食指尖 2D 投影距离（OK 手势）
  pinch_min: 0.18
  pinch_close: 0.045
  pinch_far: 0.115
  pinch_hysteresis: 0.06
  pinch_smooth: 0.38
  # 手指叉开：相对初始化张开姿态的增量（±双向）
  spread:
    span: 0.07
    gain: 2.0
    range_frac: 0.88
    t_deadzone: 0.28
    pinky_t_deadzone: 0.38
  spread_deadzone: 0.003
  spread_output_smooth: 0.32
  curl_output_smooth: 0.16
  curl_deadzone: 0.006
  # 握拳：指尖到 MCP 距离 + 全局加力（MediaPipe 弯曲角对拳不准）
  # 拇指：相对初始化平放校准，只有主动弯曲/对掌才动
  thumb:
    flex_deadzone: 0.04
    flex_span: 0.42
    tip_span: 0.38
    yaw_span: 0.28
    abd_span: 0.06
    abd_gain: 1.1
    lat_deadzone: 0.035
    oppo_deadzone: 0.10
  reach:
    open_reach: 0.90
    closed_reach: 0.36
    thumb_open_reach: 0.68
    thumb_closed_reach: 0.30
    # 每指独立阈值（手指长度差异大，统一阈值会导致短手指误判弯曲）
    index_open_reach: 0.85
    index_closed_reach: 0.34
    middle_open_reach: 0.90
    middle_closed_reach: 0.36
    ring_open_reach: 0.78
    ring_closed_reach: 0.31
    pinky_open_reach: 0.55
    pinky_closed_reach: 0.22
    fist_boost: 0.92

hardware:
  send_rate_hz: 30
  can: can0
  # 仅双手模式：左/右各一块 CAN 适配器时使用
  can_left: can1
  can_right: can0
  touch_sensor: true
  open_on_disable: true
  speed: [120, 200, 200, 200, 200]
  torque: [200, 200, 200, 200, 200]
  sdk_path: vendor/linkerhand-python-sdk
  sudo_password: ""

simulation:
  # L20 默认使用 vendor/linkerhand-urdf-main（运行 scripts/setup_linker_urdf.sh 链接）
  # 留空或设为 null 时按手别自动选 assets/mujoco/linker_hand_l20/{left|right}/linkerhand_l20_*.urdf
  mujoco_model: null
  # 仿真画面插值（0=关闭，0.3~0.4 较顺滑）
  display_smooth: 0.42
  # embedded=仿真画面嵌入主窗口右侧；window=独立 MuJoCo 窗口
  display: embedded
  panel_width: 720
  render_width: 720
  render_height: 720
  window_width: 1400
  window_height: 900

viz:
  show_landmarks: true
  show_joint_panel: true
  window_name: LinkerBot
  window_width: 1920
  window_height: 900
  setup_width: 960
  setup_height: 680
  # 初始化校准完成后自动开始遥操作（无需再按 Space）
  auto_start_teleop: false

voice:
  wake_word: "机械手"
  api_key: "${DEEPSEEK_API_KEY}"
  api_base: "https://api.deepseek.com"
  model: "deepseek-chat"
  whisper_model: "base"
  vad_threshold: 0.5
  silence_timeout: 1.5
  max_record: 5.0
  sample_rate: 16000
  gestures_path: "config/gestures.yaml"

dance:
  audio_path: "assets/music/qicai_yangguang_05x.ogg"  # 0.5x 慢速版，给舵机足够时间
  cache_path: "config/dance/qicai_yangguang_05x.yaml"
  choreography_source: asr       # asr | llm | fallback（ASR 歌词卡点为主路径）
  lookahead_ms: 200              # 提前发送手势补偿舵机延迟（毫秒）
  asr_device: cpu                # 歌词分析走 CPU，不跟语音模式抢 GPU
  force_regenerate: false        # ASR 用原速跑，关掉避免覆写 0.5x 缓存
  transition_duration: 0.25      # 插值过渡时长（秒，预留）
  # -- 以下仅 choreography_source 为 llm 或 fallback 时使用 --
  beats_per_bar: 4
  bars_per_gesture: 1
  use_llm: true                  # 向后兼容，被 choreography_source 覆盖
  api_key: "${DEEPSEEK_API_KEY}"
  api_base: "https://api.deepseek.com"
  model: "deepseek-chat"
  gesture_sequence:            # LLM 编排会覆盖此序列
    - 张开
    - 壹
    - 贰
    - 叁
    - 肆
    - 伍
    - 陆
    - 柒
    - 捌
    - 张开

api:
  hand_model: L10
  hand_side: left
  hardware_mode: linker_sdk
  host: 0.0.0.0
  port: 8765
  queue_timeout: 30.0
